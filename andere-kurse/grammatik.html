    <div class="app-container">
        <div class="start-screen" id="startScreen">
            <h1>🇩🇪 Deutsch Grammatik Trainer</h1>
            <p class="subtitle">Interaktive Übungen von A2 bis B2</p>
            <div class="level-select">
                <button class="level-btn" data-level="A2" onclick="selectLevel('A2')">A2</button>
                <button class="level-btn" data-level="B1" onclick="selectLevel('B1')">B1</button>
                <button class="level-btn" data-level="B2" onclick="selectLevel('B2')">B2</button>
                <button class="level-btn active" data-level="mixed" onclick="selectLevel('mixed')">Gemischt</button>
            </div>
            <button class="start-btn" onclick="startApp()">🚀 Los geht's!</button>
        </div>
        <div class="main-app" id="mainApp">
            <div class="app-header">
                <h2>📚 Grammatik Übungen</h2>
                <div class="stats-bar">
                    <div class="stat"><span class="icon">⭐</span> <span id="score">0</span></div>
                    <div class="stat"><span class="icon">🔥</span> <span id="streak">0</span></div>
                    <div class="stat"><span class="icon">📊</span> <span id="level">Gemischt</span></div>
                </div>
            </div>
            <div class="nav-tabs" id="navTabs">
                <button class="nav-tab active" onclick="showSection('topics')">Themen</button>
                <button class="nav-tab" onclick="showSection('practice')">Übungen</button>
                <button class="nav-tab" onclick="showSection('review')">Wiederholung</button>
            </div>
            <div class="content-area" id="contentArea">
                <div id="topicsSection">
                    <div class="topics-grid" id="topicsGrid"></div>
                </div>
                <div id="exerciseSection" class="exercise-screen">
                    <div class="exercise-header">
                        <button class="back-btn" onclick="backToTopics()">← Zurück</button>
                        <span class="exercise-progress" id="exerciseProgress">Frage 1 von 10</span>
                        <span class="timer" id="timer">⏱️ 00:00</span>
                    </div>
                    <div id="exerciseContent"></div>
                </div>
                <div id="resultsSection" class="results-screen">
                    <div class="trophy">🏆</div>
                    <h2>Übung abgeschlossen!</h2>
                    <div class="score-circle"><span id="finalScore">0%</span><span>Richtig</span></div>
                    <p class="results-message" id="resultsMessage"></p>
                    <button class="restart-btn" onclick="backToTopics()">Weiter üben →</button>
                </div>
            </div>

<script>
// ==================== DATA ====================
const grammarData = {
    A2: [
        {
            id: 'a2_verben', title: 'Verben im Präsens', emoji: '🏃', description: 'Konjugation und Gebrauch',
            exercises: [
                { type: 'multiple_choice', situation: 'Im Café: Du bestellst etwas zu trinken.', question: 'Der Kellner ___ (fragen): "Was ___ (möchten) Sie trinken?"', options: ['fragt / möchten', 'frage / möchte', 'fragt / möchte', 'fragen / möchten'], correct: 0, explanation: 'Der Kellner fragt (3. Person Singular), Sie möchten (Höflichkeitsform).' },
                { type: 'fill_blank', situation: 'Alltag: Du erzählst von deiner Familie.', question: 'Meine Schwester ___ (arbeiten) als Ärztin und ___ (wohnen) in Berlin.', answer: ['arbeitet', 'wohnt'], explanation: 'Schwester = sie (3. Person Singular): arbeitet, wohnt.' },
                { type: 'multiple_choice', situation: 'Im Supermarkt: Du triffst einen Nachbarn.', question: 'Wir ___ (sein) oft hier einkaufen. Mein Sohn ___ (mögen) besonders die Süßigkeiten.', options: ['sind / mag', 'seid / mag', 'sind / mögt', 'sein / mag'], correct: 0, explanation: 'Wir sind (1. Person Plural), mein Sohn mag (3. Person Singular).' },
                { type: 'fill_blank', situation: 'Im Büro: Du telefonierst mit einem Kollegen.', question: 'Ich ___ (rufen) Sie an, weil ich ___ (brauchen) Ihre Hilfe.', answer: ['rufe', 'brauche'], explanation: 'Ich rufe, ich brauche (1. Person Singular).' },
                { type: 'multiple_choice', situation: 'Bei Freunden: Ihr plant einen Ausflug.', question: '___ (fahren) wir morgen in den Park? Das Wetter ___ (sein) super!', options: ['Fahren / ist', 'Fahrt / ist', 'Fahren / sind', 'Fahre / ist'], correct: 0, explanation: 'Wir fahren (1. Person Plural), das Wetter ist (3. Person Singular).' },
                { type: 'fill_blank', situation: 'In der Schule: Der Lehrer fragt die Klasse.', question: 'Die Schüler ___ (lernen) Deutsch und ___ (schreiben) einen Test.', answer: ['lernen', 'schreiben'], explanation: 'Die Schüler = sie (3. Person Plural): lernen, schreiben.' },
                { type: 'multiple_choice', situation: 'Zu Hause: Du beschreibst deinen Tagesablauf.', question: 'Jeden Tag ___ (stehen) ich um 7 Uhr auf und ___ (frühstücken) dann.', options: ['stehe / frühstücke', 'stehst / frühstückst', 'stehe / frühstückst', 'steht / frühstückt'], correct: 0, explanation: 'Ich stehe, ich frühstücke (1. Person Singular).' },
                { type: 'fill_blank', situation: 'Im Restaurant: Du bestellst für deine Familie.', question: 'Meine Eltern ___ (nehmen) die Suppe und ich ___ (essen) ein Schnitzel.', answer: ['nehmen', 'esse'], explanation: 'Meine Eltern = sie (3. Person Plural): nehmen. Ich esse (1. Person Singular).' },
                { type: 'multiple_choice', situation: 'Im Zug: Du sprichst mit einem Mitfahrer.', question: 'Wohin ___ (fahren) Sie? Ich ___ (fahren) nach München.', options: ['fahren / fahre', 'fahrt / fahre', 'fahren / fahrt', 'fahre / fahre'], correct: 0, explanation: 'Sie fahren (Höflichkeitsform = Plural), ich fahre (1. Person Singular).' },
                { type: 'fill_blank', situation: 'Im Park: Kinder spielen Fußball.', question: 'Die Kinder ___ (spielen) Fußball und ___ (laufen) sehr schnell.', answer: ['spielen', 'laufen'], explanation: 'Die Kinder = sie (3. Person Plural): spielen, laufen.' }
            ]
        },
        {
            id: 'a2_akkusativ', title: 'Akkusativ', emoji: '🎯', description: 'Wen oder was?',
            exercises: [
                { type: 'multiple_choice', situation: 'Im Supermarkt: Du kaufst ein.', question: 'Ich kaufe ___ (der Apfel).', options: ['den Apfel', 'der Apfel', 'dem Apfel', 'die Apfel'], correct: 0, explanation: 'Maskulin im Akkusativ: der → den.' },
                { type: 'fill_blank', situation: 'Im Café: Du bestellst.', question: 'Ich nehme ___ (die Tasse) Kaffee und ___ (das Brötchen).', answer: ['die Tasse', 'das Brötchen'], explanation: 'Feminin bleibt: die Tasse. Neutral bleibt: das Brötchen.' },
                { type: 'multiple_choice', situation: 'Im Park: Du siehst jemanden.', question: 'Ich sehe ___ (ein Hund) im Park.', options: ['einen Hund', 'ein Hund', 'einem Hund', 'eine Hund'], correct: 0, explanation: 'Maskulin mit unbestimmtem Artikel: ein → einen im Akkusativ.' },
                { type: 'fill_blank', situation: 'Zu Hause: Du räumst auf.', question: 'Ich putze ___ (der Tisch) und wasche ___ (die Fenster).', answer: ['den Tisch', 'die Fenster'], explanation: 'Der Tisch → den Tisch. Die Fenster (Plural) bleibt gleich.' },
                { type: 'multiple_choice', situation: 'In der Stadt: Du triffst Freunde.', question: 'Ich treffe ___ (mein Freund) und ___ (meine Freundin).', options: ['meinen Freund / meine Freundin', 'mein Freund / meine Freundin', 'meinem Freund / meiner Freundin', 'meinen Freund / meiner Freundin'], correct: 0, explanation: 'Meinen Freund (Maskulin Akkusativ), meine Freundin (Feminin bleibt).' },
                { type: 'fill_blank', situation: 'Im Restaurant: Du isst.', question: 'Ich esse ___ (der Salat) und trinke ___ (das Wasser).', answer: ['den Salat', 'das Wasser'], explanation: 'Der Salat → den Salat. Das Wasser bleibt (Neutral).' },
                { type: 'multiple_choice', situation: 'Im Büro: Du schreibst eine E-Mail.', question: 'Ich schreibe ___ (der Brief) heute Abend.', options: ['den Brief', 'der Brief', 'dem Brief', 'die Brief'], correct: 0, explanation: 'Der Brief → den Brief im Akkusativ.' },
                { type: 'fill_blank', situation: 'Im Geschäft: Du suchst etwas.', question: 'Ich suche ___ (ein Buch) für meine Schwester.', answer: ['ein Buch'], explanation: 'Ein Buch (Neutral) bleibt im Akkusativ.' },
                { type: 'multiple_choice', situation: 'Im Garten: Du gießt Blumen.', question: 'Ich gieße ___ (die Blumen) jeden Tag.', options: ['die Blumen', 'der Blumen', 'den Blumen', 'das Blumen'], correct: 0, explanation: 'Plural im Akkusativ bleibt gleich: die Blumen.' },
                { type: 'fill_blank', situation: 'Im Zug: Du liest.', question: 'Ich lese ___ (die Zeitung) während der Fahrt.', answer: ['die Zeitung'], explanation: 'Feminin im Akkusativ bleibt: die Zeitung.' }
            ]
        },
        {
            id: 'a2_dativ', title: 'Dativ', emoji: '📍', description: 'Wem? Mit wem?',
            exercises: [
                { type: 'multiple_choice', situation: 'Im Restaurant: Du dankst dem Kellner.', question: 'Ich danke ___ (der Kellner) für ___ (das Essen).', options: ['dem Kellner / das Essen', 'den Kellner / das Essen', 'dem Kellner / dem Essen', 'der Kellner / das Essen'], correct: 0, explanation: 'Dativ: der Kellner → dem Kellner. Das Essen bleibt (Akkusativ nach für).' },
                { type: 'fill_blank', situation: 'Zu Hause: Du hilfst deiner Mutter.', question: 'Ich helfe ___ (meine Mutter) in ___ (die Küche).', answer: ['meiner Mutter', 'der Küche'], explanation: 'Dativ: meine Mutter → meiner Mutter. Die Küche → der Küche (in + Dativ).' },
                { type: 'multiple_choice', situation: 'Im Geschäft: Du gibst Geld.', question: 'Ich gebe ___ (der Verkäufer) ___ (das Geld).', options: ['dem Verkäufer / das Geld', 'den Verkäufer / das Geld', 'dem Verkäufer / dem Geld', 'der Verkäufer / das Geld'], correct: 0, explanation: 'Dativ: der Verkäufer → dem Verkäufer. Das Geld bleibt (Akkusativ).' },
                { type: 'fill_blank', situation: 'In der Stadt: Du begegnest jemandem.', question: 'Ich begegne ___ (ein alter Freund) auf ___ (die Straße).', answer: ['einem alten Freund', 'der Straße'], explanation: 'Dativ: ein alter Freund → einem alten Freund. Die Straße → der Straße (auf + Dativ).' },
                { type: 'multiple_choice', situation: 'Im Büro: Du antwortest dem Chef.', question: 'Ich antworte ___ (der Chef) sofort.', options: ['dem Chef', 'den Chef', 'der Chef', 'die Chef'], correct: 0, explanation: 'Dativ: der Chef → dem Chef. Verben wie antworten, danken, helfen verlangen Dativ.' },
                { type: 'fill_blank', situation: 'Im Park: Du sitzt auf einer Bank.', question: 'Ich sitze auf ___ (die Bank) neben ___ (der Brunnen).', answer: ['der Bank', 'dem Brunnen'], explanation: 'Auf + Dativ (wo?): die Bank → der Bank. Neben + Dativ: der Brunnen → dem Brunnen.' },
                { type: 'multiple_choice', situation: 'Im Restaurant: Du bestellst für Freunde.', question: 'Ich bestelle für ___ (meine Freunde) ___ (das Essen).', options: ['meine Freunde / das Essen', 'meinen Freunde / das Essen', 'meinen Freunden / das Essen', 'meine Freunde / dem Essen'], correct: 2, explanation: 'Für + Dativ: meine Freunde → meinen Freunden. Das Essen bleibt (Akkusativ).' },
                { type: 'fill_blank', situation: 'Im Kino: Du gehst mit jemandem.', question: 'Ich gehe mit ___ (mein Bruder) ins Kino.', answer: ['meinem Bruder'], explanation: 'Mit + Dativ: mein Bruder → meinem Bruder.' },
                { type: 'multiple_choice', situation: 'Im Geschäft: Du kaufst etwas für jemanden.', question: 'Ich kaufe ___ (meine Schwester) ___ (ein Buch).', options: ['meiner Schwester / ein Buch', 'meine Schwester / ein Buch', 'meiner Schwester / einem Buch', 'meinen Schwester / ein Buch'], correct: 0, explanation: 'Dativ: meine Schwester → meiner Schwester. Ein Buch bleibt (Akkusativ).' },
                { type: 'fill_blank', situation: 'Zu Hause: Du telefonierst.', question: 'Ich telefoniere mit ___ (mein Vater) über ___ (die Arbeit).', answer: ['meinem Vater', 'die Arbeit'], explanation: 'Mit + Dativ: mein Vater → meinem Vater. Über + Akkusativ: die Arbeit bleibt.' }
            ]
        },
        {
            id: 'a2_perfect', title: 'Perfekt', emoji: '✅', description: 'Vergangenheit bilden',
            exercises: [

// ==================== APP STATE ====================
let currentLevel = 'mixed';
let currentTopic = null;
let currentExerciseIndex = 0;
let score = 0;
let streak = 0;
let timerInterval = null;
let seconds = 0;
let userAnswers = {};
let topicProgress = {};

// ==================== INITIALIZATION ====================
function selectLevel(level) {
    currentLevel = level;
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.level === level);
    });
}

function startApp() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('level').textContent = currentLevel === 'mixed' ? 'Gemischt' : currentLevel;
    renderTopics();
}

function showSection(section) {
    document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
    event.target.classList.add('active');

    if (section === 'topics') {
        document.getElementById('topicsSection').style.display = 'block';
        document.getElementById('exerciseSection').style.display = 'none';
        document.getElementById('resultsSection').style.display = 'none';
        renderTopics();
    } else if (section === 'practice') {
        startMixedPractice();
    } else if (section === 'review') {
        showReview();
    }
}

// ==================== TOPICS ====================
function renderTopics() {
    const grid = document.getElementById('topicsGrid');
    grid.innerHTML = '';

    let topics = [];
    if (currentLevel === 'mixed') {
        topics = [...grammarData.A2, ...grammarData.B1, ...grammarData.B2];
    } else {
        topics = grammarData[currentLevel] || [];
    }

    topics.forEach(topic => {
        const progress = topicProgress[topic.id] || 0;
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.innerHTML = `
            <span class="emoji">${topic.emoji}</span>
            <h3>${topic.title}</h3>
            <p>${topic.description}</p>
            <div class="progress-bar">
                <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
            <p style="font-size:0.8em;color:#999;margin-top:5px">${topic.exercises.length} Übungen</p>
        `;
        card.onclick = () => startTopic(topic);
        grid.appendChild(card);
    });
}

// ==================== EXERCISES ====================
function startTopic(topic) {
    currentTopic = topic;
    currentExerciseIndex = 0;
    score = 0;
    streak = 0;
    seconds = 0;
    userAnswers = {};

    document.getElementById('topicsSection').style.display = 'none';
    document.getElementById('exerciseSection').style.display = 'block';
    document.getElementById('resultsSection').style.display = 'none';

    startTimer();
    renderExercise();
}

function startMixedPractice() {
    let allExercises = [];
    if (currentLevel === 'mixed') {
        Object.values(grammarData).forEach(level => {
            level.forEach(topic => {
                topic.exercises.forEach(ex => {
                    allExercises.push({...ex, topicTitle: topic.title, topicEmoji: topic.emoji});
                });
            });
        });
    } else {
        grammarData[currentLevel].forEach(topic => {
            topic.exercises.forEach(ex => {
                allExercises.push({...ex, topicTitle: topic.title, topicEmoji: topic.emoji});
            });
        });
    }

    // Shuffle and take 10
    allExercises = allExercises.sort(() => Math.random() - 0.5).slice(0, 10);

    currentTopic = { title: 'Gemischte Übung', emoji: '🎲', exercises: allExercises };
    currentExerciseIndex = 0;
    score = 0;
    streak = 0;
    seconds = 0;
    userAnswers = {};

    document.getElementById('topicsSection').style.display = 'none';
    document.getElementById('exerciseSection').style.display = 'block';
    document.getElementById('resultsSection').style.display = 'none';

    startTimer();
    renderExercise();
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
        const secs = (seconds % 60).toString().padStart(2, '0');
        document.getElementById('timer').textContent = `⏱️ ${mins}:${secs}`;
    }, 1000);
}

function renderExercise() {
    const ex = currentTopic.exercises[currentExerciseIndex];
    const total = currentTopic.exercises.length;

    document.getElementById('exerciseProgress').textContent = `Frage ${currentExerciseIndex + 1} von ${total}`;

    let html = `
        <div class="question-card">
            <span class="question-number">${currentExerciseIndex + 1}</span>
            <div class="situation-box">
                <div class="label">Alltagssituation</div>
                <div>${ex.situation}</div>
            </div>
            <div class="question-text">${ex.question}</div>
    `;

    if (ex.type === 'multiple_choice') {
        html += `<div class="options-grid" id="optionsGrid">`;
        ex.options.forEach((opt, idx) => {
            html += `<button class="option-btn" onclick="selectOption(${idx})" data-idx="${idx}">${opt}</button>`;
        });
        html += `</div>`;
    } else if (ex.type === 'fill_blank') {
        if (Array.isArray(ex.answer)) {
            // Multiple blanks
            let qText = ex.question;
            ex.answer.forEach((ans, idx) => {
                qText = qText.replace('___', `<input type="text" class="fill-input" id="blank${idx}" placeholder="Antwort ${idx + 1}">`);
            });
            html += `<div class="question-text">${qText}</div>`;
        } else {
            html += `<input type="text" class="fill-input" id="blank0" placeholder="Deine Antwort" style="width:100%;max-width:300px;">`;
        }
    }

    html += `
            <button class="hint-btn" onclick="toggleHint()">💡 Hinweis anzeigen</button>
            <div class="hint-text" id="hintText">${ex.explanation.split('.')[0]}...</div>
            <button class="check-btn" id="checkBtn" onclick="checkAnswer()">✓ Antwort prüfen</button>
            <div class="feedback" id="feedback">
                <h4 id="feedbackTitle"></h4>
                <div id="feedbackText"></div>
                <div class="explanation" id="explanation"></div>
            </div>
            <button class="next-btn" id="nextBtn" onclick="nextExercise()">Weiter →</button>
        </div>
    `;

    document.getElementById('exerciseContent').innerHTML = html;
}

function toggleHint() {
    const hint = document.getElementById('hintText');
    hint.style.display = hint.style.display === 'block' ? 'none' : 'block';
}

function selectOption(idx) {
    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
    document.querySelector(`[data-idx="${idx}"]`).classList.add('selected');
    userAnswers[currentExerciseIndex] = idx;
}

function checkAnswer() {
    const ex = currentTopic.exercises[currentExerciseIndex];
    let isCorrect = false;
    let userAnswer = '';

    if (ex.type === 'multiple_choice') {
        const selected = document.querySelector('.option-btn.selected');
        if (!selected) {
            alert('Bitte wähle eine Antwort!');
            return;
        }
        const selectedIdx = parseInt(selected.dataset.idx);
        isCorrect = selectedIdx === ex.correct;
        userAnswer = ex.options[selectedIdx];

        document.querySelectorAll('.option-btn').forEach((btn, idx) => {
            btn.disabled = true;
            if (idx === ex.correct) btn.classList.add('correct');
            else if (idx === selectedIdx && !isCorrect) btn.classList.add('wrong');
        });
    } else if (ex.type === 'fill_blank') {
        if (Array.isArray(ex.answer)) {
            let allCorrect = true;
            ex.answer.forEach((ans, idx) => {
                const input = document.getElementById(`blank${idx}`);
                const val = input.value.trim().toLowerCase();
                const correct = ans.toLowerCase();
                if (val === correct) {
                    input.classList.add('correct');
                } else {
                    input.classList.add('wrong');
                    allCorrect = false;
                }
                input.disabled = true;
            });
            isCorrect = allCorrect;
            userAnswer = ex.answer.join(' / ');
        } else {
            const input = document.getElementById('blank0');
            const val = input.value.trim().toLowerCase();
            const correct = ex.answer.toLowerCase();
            isCorrect = val === correct;
            if (isCorrect) input.classList.add('correct');
            else input.classList.add('wrong');
            input.disabled = true;
            userAnswer = input.value;
        }
    }

    const feedback = document.getElementById('feedback');
    const feedbackTitle = document.getElementById('feedbackTitle');
    const feedbackText = document.getElementById('feedbackText');
    const explanation = document.getElementById('explanation');

    if (isCorrect) {
        feedback.className = 'feedback correct';
        feedbackTitle.textContent = '🎉 Richtig! Sehr gut!';
        feedbackText.textContent = `Deine Antwort: "${userAnswer}"`;
        score += 10 + (streak * 2);
        streak++;
        createConfetti();
    } else {
        feedback.className = 'feedback wrong';
        feedbackTitle.textContent = '❌ Leider falsch';
        if (ex.type === 'multiple_choice') {
            feedbackText.textContent = `Richtig wäre: "${ex.options[ex.correct]}"`;
        } else {
            feedbackText.textContent = `Richtig wäre: "${Array.isArray(ex.answer) ? ex.answer.join(' / ') : ex.answer}"`;
        }
        streak = 0;
    }

    explanation.textContent = `💡 Erklärung: ${ex.explanation}`;

    document.getElementById('score').textContent = score;
    document.getElementById('streak').textContent = streak;
    document.getElementById('checkBtn').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'block';
}

function nextExercise() {
    currentExerciseIndex++;
    if (currentExerciseIndex >= currentTopic.exercises.length) {
        showResults();
    } else {
        renderExercise();
    }
}

function showResults() {
    clearInterval(timerInterval);
    document.getElementById('exerciseSection').style.display = 'none';
    document.getElementById('resultsSection').style.display = 'block';

    const total = currentTopic.exercises.length;
    const maxScore = total * 10;
    const percentage = Math.round((score / maxScore) * 100);

    document.getElementById('finalScore').textContent = `${percentage}%`;

    let message = '';
    if (percentage >= 90) message = '🌟 Hervorragend! Du bist ein Grammatik-Profi!';
    else if (percentage >= 70) message = '👍 Sehr gut! Du hast das meiste verstanden.';
    else if (percentage >= 50) message = '💪 Gut gemacht! Übe noch ein bisschen mehr.';
    else message = '📚 Nicht aufgeben! Jede Übung bringt dich weiter.';

    document.getElementById('resultsMessage').textContent = message;

    // Update topic progress
    if (currentTopic.id) {
        topicProgress[currentTopic.id] = Math.max(topicProgress[currentTopic.id] || 0, percentage);
    }

    if (percentage >= 80) createConfetti();
}

function backToTopics() {
    clearInterval(timerInterval);
    document.getElementById('exerciseSection').style.display = 'none';
    document.getElementById('resultsSection').style.display = 'none';
    document.getElementById('topicsSection').style.display = 'block';
    renderTopics();
}

function showReview() {
    const grid = document.getElementById('topicsGrid');
    grid.innerHTML = '<div style="text-align:center;padding:40px;"><h3>📚 Wiederholung</h3><p>Wähle ein Thema aus, das du wiederholen möchtest.</p></div>';
    renderTopics();
    document.getElementById('topicsSection').style.display = 'block';
    document.getElementById('exerciseSection').style.display = 'none';
    document.getElementById('resultsSection').style.display = 'none';
}

// ==================== EFFECTS ====================
function createConfetti() {
    const colors = ['#667eea', '#764ba2', '#FFD700', '#4CAF50', '#f44336', '#FF9800'];
    for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
    }
}

// Keyboard support
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const checkBtn = document.getElementById('checkBtn');
        const nextBtn = document.getElementById('nextBtn');
        if (checkBtn && checkBtn.style.display !== 'none') {
            checkAnswer();
        } else if (nextBtn && nextBtn.style.display !== 'none') {
            nextExercise();
        }
    }
});
</script>
